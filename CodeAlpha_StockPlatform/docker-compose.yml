version: '3.8'

services:
  # ── MySQL Database ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: bullrun-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bullrun_db
      MYSQL_USER: bullrun_user
      MYSQL_PASSWORD: bullrun_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ── Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bullrun-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bullrun_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: bullrun_user
      SPRING_DATASOURCE_PASSWORD: bullrun_pass
      JWT_SECRET: BullRunSecretKey2024NSESimulatorVeryLongSecretKeyForHS256Algorithm
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bullrun-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  mysql_data:
