# ============================================================
# BullRun - NSE Stock Trading Simulator
# Spring Boot Application Properties
# ============================================================

spring.application.name=bullrun

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/bullrun_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=bullrun_user
spring.datasource.password=bullrun_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=BullRunSecretKey2024NSESimulatorVeryLongSecretKeyForHS256Algorithm
jwt.expiration=86400000

# --- Server ---
server.port=8080
server.error.include-message=always

# --- Logging ---
logging.level.com.bullrun=INFO
logging.level.org.springframework.security=WARN
